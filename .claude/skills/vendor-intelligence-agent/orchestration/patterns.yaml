---
name: anomaly_investigation
description: Multi-step investigation of vendor cost or performance anomalies
---

# Pattern: Anomaly Investigation

**Trigger**: User asks "Why did [vendor] [metric] [change]?"

## Steps

### 1. Quantify the Anomaly (BigQuery)

Cost: ~200 tokens

```yaml
tool: bigquery_query
goal: "Determine the magnitude and timing of the change"
sql: |
  SELECT 
    DATE_TRUNC(event_date, MONTH) as month,
    vendor_id,
    SUM(amount) as monthly_spend,
    LAG(SUM(amount)) OVER (ORDER BY DATE_TRUNC(event_date, MONTH)) as prior_month,
    SAFE_DIVIDE(SUM(amount) - LAG(SUM(amount)) OVER (ORDER BY DATE_TRUNC(event_date, MONTH)), 
                LAG(SUM(amount)) OVER (ORDER BY DATE_TRUNC(event_date, MONTH))) * 100 as pct_change
  FROM procurement.spend_transactions
  WHERE vendor_id = @vendor_id
    AND event_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 6 MONTH)
  GROUP BY month, vendor_id
  ORDER BY month DESC
action: "Store anomaly month and % change in context"
```

### 2. Get Business Context (Looker)

Cost: ~300 tokens

```yaml
tool: looker_explore
goal: "Understand vendor category and peer performance"
explore: "vendor_performance"
filters:
  vendor_id: "@vendor_id"
  timeframe: "last_6_months"
fields:
  - vendor_name
  - category
  - po_count
  - on_time_delivery_rate
action: "Compare this vendor's operations vs category"
```

### 3. Root Cause: Search Documents (Documents)

Cost: ~500 tokens

```yaml
tool: document_search
goal: "Find contractual or communication explanation"
queries:
  - "Vendor [@vendor_name] pricing change contract amendment [@anomaly_month]"
  - "Cost increase price adjustment [@vendor_name]"
  - "New line items [@vendor_name] [@anomaly_month]"
action: "Extract key insights about cause"
```

### 4. Visualize Findings (Tableau)

Cost: ~400 tokens

```yaml
tool: create_tableau_dashboard
goal: "Present anomaly to stakeholders"
title: "Vendor Cost Anomaly: [@vendor_name]"
metrics:
  - chart_type: "line"
    metric: "monthly_spend"
    highlight_point: "anomaly_month"
  - chart_type: "bar"
    metric: "spend_by_category"
    filter: "anomaly_month"
action: "Generate dashboard URL for sharing"
```

### 5. Synthesize & Recommend (Synthesis)

```yaml
format: "Executive summary"
content:
  - Quantified change: "Spend increased XX% in [month]"
  - Likely cause: "Document search found [evidence]"
  - Peer comparison: "Category average is [value]"
  - Recommended action: "[Action] based on [reasoning]"
  - Dashboard: "View details at [URL]"
```

## Token Budget: ~1,400 (fits within 5,000 limit)


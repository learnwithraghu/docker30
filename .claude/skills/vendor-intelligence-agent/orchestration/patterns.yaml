name: strategic_sourcing
description: Vendor renewal vs switch decision analysis
---

# Pattern: Strategic Sourcing

**Trigger**: User asks "Should we renew with [Vendor A] or switch to [Vendor B]?"

## Steps

### 1. Parallel Data Collection (BigQuery)

Cost: ~800 tokens (2 complex queries)

```yaml
tool: bigquery_query
goal: "Compare 3-year performance of both vendors"
queries:
  - vendor_a_metrics: |
      SELECT 
        'Vendor A' as vendor,
        SUM(t.amount) as three_year_spend,
        COUNT(DISTINCT p.po_id) as po_count,
        ROUND(SAFE_DIVIDE(COUNTIF(d.actual_delivery <= p.promised_date), COUNT(*)) * 100, 1) as otd_rate,
        ROUND(SAFE_DIVIDE(SUM(CASE WHEN qa.defective_units > 0 THEN 1 ELSE 0 END), COUNT(*)) * 100, 1) as defect_pct
      FROM procurement.spend_transactions t
      LEFT JOIN procurement.purchase_orders p ON t.po_id = p.po_id
      LEFT JOIN procurement.delivery_receipts d ON p.po_id = d.po_id
      LEFT JOIN procurement.quality_audits qa ON d.po_id = qa.po_id
      WHERE t.vendor_id = @vendor_a_id
        AND t.event_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 3 YEAR)
      
  - vendor_b_metrics: [Same as above with @vendor_b_id]
```

### 2. Document: Contract Terms (Documents)

Cost: ~500 tokens

```yaml
tool: document_search
goal: "Extract contract terms for both vendors"
queries:
  - "Vendor A contract exit clause renewal terms pricing"
  - "Vendor B contract SLA terms performance guarantees"
action: "Summarize key contract differences"
```

### 3. Semantic Layer: Category Benchmarks (Looker)

Cost: ~600 tokens

```yaml
tool: looker_explore
goal: "Compare against category baseline"
explore: "category_benchmarks"
filters:
  category: "@category"
  timeframe: "last_36_months"
metrics:
  - avg_spend_per_vendor
  - avg_otd_rate
  - avg_defect_rate
```

### 4. Calculate Switching Costs (BigQuery)

Cost: ~200 tokens

```yaml
tool: bigquery_query
goal: "Quantify cost of switching"
sql: |
  SELECT 
    'Switching costs' as cost_type,
    SUM(CASE WHEN cost_category = 'setup' THEN amount END) as setup_costs,
    SUM(CASE WHEN cost_category = 'training' THEN amount END) as training_costs,
    SUM(CASE WHEN cost_category = 'transition' THEN amount END) as transition_costs,
    SUM(amount) as total_switch_cost
  FROM procurement.cost_estimates
  WHERE from_vendor_id = @vendor_a_id
    AND to_vendor_id = @vendor_b_id
```

### 5. Create Comparison Dashboard (Tableau)

Cost: ~400 tokens

```yaml
tool: create_tableau_dashboard
title: "Vendor Sourcing Decision: [@vendor_a] vs [@vendor_b]"
charts:
  - type: "comparison matrix"
    dimensions: [spend, otd_rate, defect_rate, cost, satisfaction]
  - type: "contract terms"
    data:
      - Renewal date
      - Price escalation clause
      - Exit penalties
  - type: "financial impact"
    data:
      - 3-year cost comparison
      - Switching costs
      - NPV of each option
```

### 6. Decision Framework (Synthesis)

```yaml
format: "Sourcing recommendation memo"
sections:
  - Vendor A: "Strengths/Weaknesses with scores"
  - Vendor B: "Strengths/Weaknesses with scores"
  - Quantified comparison: "3-year TCO including switch costs"
  - Risk assessment: "Key differences in contract terms"
  - Recommendation: "Switch vs Renew with rationale"
  - Next steps: "If switching: timeline, transition plan"
```

## Token Budget: ~2,500 (fits within 5,000 limit)


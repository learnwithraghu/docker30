name: proactive_monitoring
description: Autonomous weekly/monthly vendor health monitoring
---

# Pattern: Proactive Monitoring (Scheduled)

**Trigger**: Runs on a schedule (e.g., weekly), no user input

## Steps

### 1. Anomaly Detection (BigQuery)

Cost: ~200 tokens

```yaml
tool: bigquery_query
schedule: "weekly"
goal: "Detect vendors with >20% spend variance"
sql: |
  WITH weekly_spend AS (
    SELECT 
      vendor_id,
      EXTRACT(WEEK FROM event_date) as week,
      DATE_TRUNC(event_date, WEEK) as week_start,
      SUM(amount) as weekly_spend,
      AVG(SUM(amount)) OVER (PARTITION BY vendor_id ORDER BY EXTRACT(WEEK FROM event_date) ROWS BETWEEN 12 PRECEDING AND 1 PRECEDING) as avg_prev_weeks
    FROM procurement.spend_transactions
    WHERE event_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 16 WEEK)
    GROUP BY vendor_id, week, week_start
  )
  SELECT 
    vendor_id,
    week_start,
    weekly_spend,
    avg_prev_weeks,
    SAFE_DIVIDE(ABS(weekly_spend - avg_prev_weeks), avg_prev_weeks) * 100 as variance_pct
  WHERE SAFE_DIVIDE(ABS(weekly_spend - avg_prev_weeks), avg_prev_weeks) * 100 > 20
  ORDER BY variance_pct DESC
```

### 2. Risk Score Check (Looker)

Cost: ~300 tokens

```yaml
tool: looker_explore
schedule: "weekly"
goal: "Flag vendors with risk_score > 7"
explore: "vendor_risk_assessment"
filters:
  risk_score: "> 7"
metrics:
  - vendor_name
  - risk_score
  - risk_category
```

### 3. Conditional Actions

```yaml
if: high_variance_vendors OR high_risk_vendors
  then:
    # For each anomaly vendor:
    - search_documents:
        query: "Vendor [@name] recent changes emails contract"
        goal: "Understand recent activity"
    
    - create_tableau_dashboard:
        title: "Vendor Risk Watch [@vendor]"
        metrics: [spend_trend, quality_trend, risk_score]
    
    - notify: "Procurement manager"
      message: "Vendor [@vendor] flagged for review: variance=[@value]%"
```

### 4. Summary Report (Auto-generated)

Cost: ~200 tokens

```yaml
tool: write_google_doc
schedule: "weekly"
title: "Vendor Health Report - Week of [@date]"
content:
  - "Anomalies detected": list of vendors
  - "High-risk vendors": list with scores
  - "Action items": recommended follow-ups
  - "Dashboard link": Risk Watch dashboard
```

## Token Budget: ~700 per week (very efficient)

## Benefits

- **Proactive**: Catch issues before they become problems
- **Autonomous**: Runs without user intervention
- **Efficient**: Uses lazy tool loading, minimal context
- **Actionable**: Generates notifications and dashboards automatically
